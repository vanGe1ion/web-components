<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        display: flex;
        padding: 0;
        margin: 0;
      }

      todo-list {
        width: 50%;
      }
    </style>

    <script type="module" src="todo-list/index.js"></script>
  </head>
  <body>
    <todo-list title="My TODO list" variant="circle"></todo-list>

    <script>
      const body = document.querySelector("body");
      const myList = document.createElement("todo-list");
      myList.setAttribute("title", "My plans");
      myList.setAttribute("variant", "square");
      body.append(myList);
      setTimeout(() => myList.remove(), 1000);
      setTimeout(() => body.append(myList), 2000);
    </script>

    <script src="http://localhost:1338/livereload.js"></script>
  </body>
</html>
